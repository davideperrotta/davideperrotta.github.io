  # Sviluppatore web e software a Milano

  Vivo e lavoro tra **Milano** e **Catanzaro** come sviluppatore web, sviluppatore software e architetto software.
  Da oltre dieci anni progetto e realizzo applicazioni web moderne, performanti e facili da mantenere.

  Come *web developer* e *full‑stack developer* mi occupo sia di frontend che di backend, seguendo ogni fase:

  - analisi dei requisiti e progettazione dell'architettura
  - sviluppo di API e servizi backend scalabili
  - sviluppo frontend con interfacce veloci e responsive
  - integrazione con servizi cloud e CI/CD

  Se stai cercando uno **sviluppatore web a Milano** o uno **sviluppatore software con esperienza** per un nuovo progetto o per evolvere una piattaforma esistente, puoi contattarmi dalla home del sito.

  Lavoro abitualmente con stack moderni (JavaScript, TypeScript, framework frontend e backend) e con pratiche di ingegneria del software orientate alla qualità del codice e alla manutenzione nel lungo periodo.
