  # Sviluppatore web e mobile a Catanzaro

  Sono un **sviluppatore web e mobile a Catanzaro** con molti anni di esperienza nello sviluppo di applicazioni su misura.
  Lavoro da remoto e in presenza tra Catanzaro e Milano, seguendo clienti in tutta Italia.

  Come sviluppatore seguo l'intero ciclo di vita del software:

  - raccolta dei requisiti e definizione degli obiettivi
  - progettazione dell'architettura software
  - sviluppo di applicazioni web e mobile
  - ottimizzazione delle performance e della sicurezza

  Se ti serve uno **sviluppatore a Catanzaro** per un sito web, una web app o un sistema più complesso, posso aiutarti a progettare una soluzione scalabile e mantenibile.

  Integro spesso flussi di lavoro **assistiti dall'AI** per accelerare lo sviluppo e migliorare la qualità, mantenendo sempre un controllo ingegneristico sul codice prodotto.
